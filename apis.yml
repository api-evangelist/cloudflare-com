aid: cloudflare-com
name: Cloudflare.com
description: >-
  cloudflare-com is an alias profile for Cloudflare. The canonical company
  profile lives at the cloudflare repository in the API Evangelist Network;
  this entry exists so that the ".com" form of the brand resolves into the
  same canonical record. Cloudflare's developer surface includes a single
  unified REST API at api.cloudflare.com covering DNS, zones, SSL/TLS,
  Workers, KV, Durable Objects, Queues, R2, Pages, Stream, Email Routing,
  Zero Trust, WAF, Magic Transit, Spectrum, Load Balancing, Analytics, and
  Account Management. Authentication is via API tokens with scoped
  permissions or legacy global API keys.
